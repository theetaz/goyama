name: api

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'services/api/**'
      - 'go.work'
      - '.github/workflows/api.yml'

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: vet · test · fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: services/api/go.sum

      - name: Vet
        run: go vet ./...

      - name: Gofmt check
        run: |
          unformatted=$(gofmt -l -s .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./... -race -count=1
