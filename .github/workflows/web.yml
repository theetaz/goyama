name: web

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # `pnpm build` invokes the TanStack router plugin (which generates
      # routeTree.gen.ts) before running `tsc -b --noEmit`, so this step
      # covers both the build and the typecheck gate.
      - name: Build
        run: pnpm build
