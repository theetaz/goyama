# Local-dev stack for Goyama.
#
# Run `make db-up` to start, `make db-migrate` to apply the canonical schema,
# `make db-seed` to load the crops corpus, and `make db-down` to stop.
# Data persists in the named volume between runs; `make db-reset` wipes it.

services:
  db:
    build: ./infra/postgres
    image: goyama-postgres:local
    container_name: goyama-db
    environment:
      POSTGRES_USER: goyama
      POSTGRES_PASSWORD: goyama
      POSTGRES_DB: goyama
    # Published on 54320 to avoid clashing with any host-local Postgres.
    ports:
      - "54320:5432"
    volumes:
      - goyama-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goyama -d goyama"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  goyama-db-data:
